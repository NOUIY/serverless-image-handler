version: '3.8'
services:
  dynamodb-local:
    build:
      context: .
      dockerfile: Dockerfile.dynamodb-local
    image: dynamodb-local-patched:latest
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3